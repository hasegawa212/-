# Render Blueprint (https://render.com) — financial-literacy-line-bot
#
# 使い方は2通り:
#  A) このファイルをリポジトリ "ルート" に置くと、Render の Blueprint で自動構築されます。
#     （モノレポのため既定はサブプロジェクト内に置いています。ルートにコピーして使ってください）
#  B) Render ダッシュボードで「New + > Web Service」から手動作成し、
#     Root Directory を financial-literacy-line-bot に設定（README 参照）。
#
# どちらの場合も、LINE_CHANNEL_SECRET / LINE_CHANNEL_ACCESS_TOKEN は
# 値を Git に入れず、Render の Environment で設定します（sync: false）。

services:
  - type: web
    name: financial-literacy-line-bot
    runtime: node
    rootDir: financial-literacy-line-bot
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
