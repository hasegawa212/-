<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>案件ステージ更新</title>
<style>
  :root { --primary: #ea580c; --bg: #f8fafc; --border: #cbd5e1; --text: #0f172a; --muted: #64748b; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; margin: 0; padding: 24px; background: var(--bg); color: var(--text); }
  .container { max-width: 720px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.06); overflow: hidden; }
  header { background: var(--primary); color: white; padding: 20px 28px; }
  header h1 { margin: 0; font-size: 20px; }
  header .meta { font-size: 13px; opacity: .85; margin-top: 4px; }
  main { padding: 28px; }
  .field { margin-bottom: 18px; }
  label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  input, select, textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; background: white;
  }
  textarea { resize: vertical; min-height: 80px; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .actions { display: flex; gap: 12px; margin-top: 24px; }
  button { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; }
  .primary { background: var(--primary); color: white; }
  .secondary { background: #e2e8f0; color: var(--text); }
  .output { background: #f1f5f9; padding: 14px; border-radius: 8px; margin-top: 20px; font-family: monospace; font-size: 12px; white-space: pre-wrap; display: none; }
  .stage-flow { display: flex; align-items: center; gap: 8px; padding: 12px; background: #fff7ed; border-radius: 8px; margin-bottom: 20px; font-size: 13px; }
  .stage-flow .arrow { color: var(--primary); font-weight: 700; }
  .nav { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
  .nav a { color: var(--primary); text-decoration: none; margin: 0 8px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🔄 案件ステージ更新</h1>
    <div class="meta">ステージ遷移時の進捗報告</div>
  </header>
  <main>
    <form id="form">
      <div class="row">
        <div class="field">
          <label>更新日</label>
          <input type="date" name="updatedAt" required>
        </div>
        <div class="field">
          <label>担当者</label>
          <input type="text" name="staff" placeholder="例: 坂本" required>
        </div>
      </div>

      <div class="field">
        <label>案件 ID</label>
        <input type="text" name="dealCode" placeholder="DEAL-2026-00000" pattern="DEAL-\d{4}-\d{5}" required>
      </div>

      <div class="stage-flow" id="flow">
        <span id="from">前ステージ</span>
        <span class="arrow">→</span>
        <span id="to">新ステージ</span>
      </div>

      <div class="row">
        <div class="field">
          <label>前ステージ</label>
          <select name="fromStage" id="fromSelect" required>
            <option value="">選択</option>
            <option>商談中・銀行検討中</option>
            <option>事前審査・申込済</option>
            <option>本承認・本審査中</option>
            <option>金消契約完了</option>
            <option>決済予定</option>
          </select>
        </div>
        <div class="field">
          <label>新ステージ</label>
          <select name="toStage" id="toSelect" required>
            <option value="">選択</option>
            <option>商談中・銀行検討中</option>
            <option>事前審査・申込済</option>
            <option>本承認・本審査中</option>
            <option>金消契約完了</option>
            <option>決済予定</option>
            <option>案件完了</option>
            <option>否決・見送り</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>遷移理由・トリガー</label>
        <textarea name="reason" placeholder="例: 4/22 事前承認取得、本審査持込予定" required></textarea>
      </div>

      <div class="field">
        <label>次のアクション</label>
        <input type="text" name="nextAction" placeholder="例: 4/25 まで本申込書類整備" required>
      </div>

      <div class="field">
        <label>備考・課題</label>
        <textarea name="note" placeholder="調整中の点があれば"></textarea>
      </div>

      <div class="actions">
        <button type="submit" class="primary">更新を送信</button>
        <button type="reset" class="secondary">クリア</button>
      </div>
    </form>
    <pre id="output" class="output"></pre>
    <div class="nav">
      <a href="sales-report-form.html">案件報告</a> ·
      <a href="sales-report-form-complete.html">完了報告</a> ·
      <a href="apo-cancel-form.html">アポキャンセル</a>
    </div>
  </main>
</div>
<script>
const fromSel = document.getElementById('fromSelect');
const toSel = document.getElementById('toSelect');
const fromLbl = document.getElementById('from');
const toLbl = document.getElementById('to');
fromSel.addEventListener('change', () => fromLbl.textContent = fromSel.value || '前ステージ');
toSel.addEventListener('change', () => toLbl.textContent = toSel.value || '新ステージ');

document.getElementById('form').addEventListener('submit', e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  const out = document.getElementById('output');
  out.style.display = 'block';
  out.textContent = JSON.stringify({type: 'sales-report-update', ...data}, null, 2);
  navigator.clipboard?.writeText(out.textContent).then(() => {
    out.textContent += '\n\n--- ✓ クリップボードにコピー済み ---';
  });
});
</script>
</body>
</html>
