<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>案件完了報告</title>
<style>
  :root { --primary: #16a34a; --bg: #f8fafc; --border: #cbd5e1; --text: #0f172a; --muted: #64748b; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; margin: 0; padding: 24px; background: var(--bg); color: var(--text); }
  .container { max-width: 720px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.06); overflow: hidden; }
  header { background: var(--primary); color: white; padding: 20px 28px; }
  header h1 { margin: 0; font-size: 20px; }
  header .meta { font-size: 13px; opacity: .85; margin-top: 4px; }
  main { padding: 28px; }
  .field { margin-bottom: 18px; }
  label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  input[type="text"], input[type="date"], input[type="number"], select, textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; background: white;
  }
  textarea { resize: vertical; min-height: 80px; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .actions { display: flex; gap: 12px; margin-top: 24px; }
  button { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; }
  .primary { background: var(--primary); color: white; }
  .secondary { background: #e2e8f0; color: var(--text); }
  .output { background: #f1f5f9; padding: 14px; border-radius: 8px; margin-top: 20px; font-family: monospace; font-size: 12px; white-space: pre-wrap; display: none; }
  .nav { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
  .nav a { color: var(--primary); text-decoration: none; margin: 0 8px; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 6px; margin: 20px 0 12px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>✅ 案件完了報告</h1>
    <div class="meta">決済完了・引渡し完了案件のクロージング報告</div>
  </header>
  <main>
    <form id="form">
      <div class="row">
        <div class="field">
          <label>完了日（決済日）</label>
          <input type="date" name="closingDate" required>
        </div>
        <div class="field">
          <label>担当者</label>
          <input type="text" name="staff" placeholder="例: 嶺田" required>
        </div>
      </div>

      <div class="field">
        <label>案件 ID</label>
        <input type="text" name="dealCode" placeholder="DEAL-2026-00000" pattern="DEAL-\d{4}-\d{5}" required>
      </div>

      <div class="field">
        <label>顧客匿名コード</label>
        <input type="text" name="customerCode" placeholder="例: CUST-A" required>
      </div>

      <div class="section-title">物件情報</div>

      <div class="row">
        <div class="field">
          <label>物件種別</label>
          <select name="propertyKind" required>
            <option value="">選択</option>
            <option>新築マンション</option>
            <option>中古マンション</option>
            <option>新築戸建</option>
            <option>中古戸建</option>
            <option>一棟アパート</option>
            <option>一棟マンション</option>
            <option>土地</option>
          </select>
        </div>
        <div class="field">
          <label>物件所在地（市町村）</label>
          <input type="text" name="propertyCity" placeholder="例: 水戸市">
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>売買価格レンジ</label>
          <select name="priceRange" required>
            <option value="">選択</option>
            <option>〜 1,000 万</option>
            <option>1,000 〜 3,000 万</option>
            <option>3,000 〜 5,000 万</option>
            <option>5,000 〜 8,000 万</option>
            <option>8,000 万 〜 1.5 億</option>
            <option>1.5 億 〜</option>
          </select>
          <div class="hint">具体額は機微情報のため別途管理</div>
        </div>
        <div class="field">
          <label>三為案件か</label>
          <select name="isThreeWay">
            <option value="false">いいえ</option>
            <option value="true">はい（売主→MA→東洋→買主）</option>
          </select>
        </div>
      </div>

      <div class="section-title">融資情報</div>

      <div class="row">
        <div class="field">
          <label>確定金融機関</label>
          <input type="text" name="bank" placeholder="例: 中央労働金庫" required>
        </div>
        <div class="field">
          <label>融資商品</label>
          <select name="loanProduct">
            <option value="">選択</option>
            <option>変動金利</option>
            <option>固定 10 年</option>
            <option>全期間固定</option>
            <option>フラット 35</option>
            <option>フラット 50</option>
          </select>
        </div>
      </div>

      <div class="section-title">振り返り</div>

      <div class="field">
        <label>うまく行った点</label>
        <textarea name="winPoints" placeholder="次回も再現したいポイント"></textarea>
      </div>

      <div class="field">
        <label>苦労した点・改善点</label>
        <textarea name="painPoints" placeholder="次回避けたい点"></textarea>
      </div>

      <div class="actions">
        <button type="submit" class="primary">完了報告を送信</button>
        <button type="reset" class="secondary">クリア</button>
      </div>
    </form>
    <pre id="output" class="output"></pre>
    <div class="nav">
      <a href="sales-report-form.html">案件報告</a> ·
      <a href="customer-feedback-form.html">顧客フィードバック</a>
    </div>
  </main>
</div>
<script>
document.getElementById('form').addEventListener('submit', e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  const out = document.getElementById('output');
  out.style.display = 'block';
  out.textContent = JSON.stringify({type: 'sales-report-complete', ...data}, null, 2);
  navigator.clipboard?.writeText(out.textContent).then(() => {
    out.textContent += '\n\n--- ✓ クリップボードにコピー済み ---';
  });
});
</script>
</body>
</html>
